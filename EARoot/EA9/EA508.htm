		function initPage()
        {			
			var divs = document.getElementsByClassName("ObjectDetailsNotes");
			for (var j = 0; j < divs.length; j++) {
				var tmpStr = divs[j].innerHTML;
				tmpStr = tmpStr.replace(/#gt;/g, "&gt;");
				tmpStr = tmpStr.replace(/#lt;/g, "&lt;");

				tmpStr = tmpStr.replace(/&gt;/g, ">");
				tmpStr = tmpStr.replace(/&lt;/g, "<");

				divs[j].innerHTML = tmpStr;
			}

            if (document.getElementById('TableGroup') != null)
            {
                toggleItem(document.getElementById('TableGroup').getElementsByTagName('li')[0].id.replace("Title", ""));
            }

        }
		
		document.addEventListener('DOMContentLoaded', () => {
			const img = document.querySelector('.diagram_image img');
			const mapAreas = document.querySelectorAll('area');

			if (img && mapAreas.length > 0) {
				//Get original and rendered image dimensions
				const originalWidth = img.naturalWidth;
				const originalHeight = img.naturalHeight;
				const renderedWidth = img.clientWidth || originalWidth; 
				const renderedHeight = img.clientHeight || originalHeight; 
				
				//Calculate scaling factors
				const scaleX = renderedWidth / originalWidth;
				const scaleY = renderedHeight / originalHeight;

				//Adjust map area coordinates
				mapAreas.forEach((area) => {
				  const originalCoords = area.getAttribute('coords').split(',').map(Number);
				  const scaledCoords = originalCoords.map((coord, index) =>
					index % 2 === 0 ? coord * scaleX : coord * scaleY
				  );
				  area.setAttribute('coords', scaledCoords.join(','));
				});
			}
		});
</script>
